<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>AIM Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="bg"></div>

  <div class="card">

    <h2>AIM Login</h2>

    <select id="role" onchange="changeRole()">
      <option value="admin">👑 Admin</option>
      <option value="sales" selected>📞 Sales</option>
      <option value="student">🎓 Student</option>
    </select>

    <input id="name" placeholder="Name" style="display:none;">
    <input id="email" placeholder="Email">
    <input id="username" placeholder="Username (Unique ID)" style="display:none;">
    <input id="batch" placeholder="Batch (e.g., Batch-1, Batch-2)" style="display:none;">
    <input id="password" type="password" placeholder="Password">

    <p id="studentHelp" style="display:none; font-size:12px; color:#666; margin-top:-10px; margin-bottom:10px;">
      Use the exact Batch format: Batch-1, Batch-2, or Batch-3
    </p>

    <p id="msg"></p>

    <button onclick="login()">Login</button>

    <div class="links">
      Sales Only? <a href="register.html">Register</a>
    </div>

  </div>

  <script src="js/login.js"></script>
</body>

</html>
