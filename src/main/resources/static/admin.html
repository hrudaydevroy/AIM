<!DOCTYPE html>
<html>

<head>
  <title>Admin Dashboard</title>

  <style>
    /* ===== BODY ===== */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #edf2ff;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 230px;
      background: #4f46e5;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 25px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      transition: .3s;
    }

    .sidebar a:hover {
      background: #6366f1;
      transform: translateX(5px);
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      padding: 25px;
    }

    /* ===== CARD ===== */
    .card {
      background: #f8fbff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
      animation: fadeIn .6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h3 {
      margin-top: 0;
    }

    /* ===== INPUTS ===== */
    input,
    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #dbeafe;
      background: #f1f5ff;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: .3s;
    }

    button:hover {
      background: #1e40af;
      transform: scale(1.05);
    }

    /* ===== TABLE ===== */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #dbeafe;
    }

    .status {
      background: #bfdbfe;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .delete {
      background: #ef4444;
    }

    .delete:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

  <!-- ===== SIDEBAR ===== -->
  <div class="sidebar">
    <h2>👑 Admin</h2>
    <a href="#">Dashboard</a>
    <a href="#">Students</a>
    <a href="#">Videos</a>
    <a href="#">Leads</a>
    <a href="#" onclick="logout()" style="margin-top: 20px; background: #ef4444; color: white; text-align: center;">🚪 Logout</a>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <!-- VIDEO UPLOAD -->
    <div class="card">
      <h3>Upload Course Video</h3>

      <input id="title" placeholder="Video Title">
      <input id="url" placeholder="YouTube Embed URL">

      <select id="batch">
        <option value="Batch-1">Batch 1</option>
        <option value="Batch-2">Batch 2</option>
        <option value="Batch-3">Batch 3</option>
      </select>

      <input id="course" placeholder="Course Name">

      <button onclick="uploadVideo()">Upload Video</button>
    </div>

    <!-- ADD STUDENT -->
    <div class="card">
      <h3>Add New Student</h3>

      <input id="sname" placeholder="Student Name" required>
      <input id="semail" placeholder="Email (Optional)">
      <input id="sphone" placeholder="Phone (Optional)">

      <select id="sbatch" required>
        <option value="Batch-1">Batch-1</option>
        <option value="Batch-2">Batch-2</option>
        <option value="Batch-3">Batch-3</option>
      </select>

      <input id="scourse" placeholder="Course Name" required>
      <input id="suser" placeholder="Unique Login ID (Required)" required>
      <input id="spass" placeholder="Password (Required)" type="password" required>

      <p id="addStudentMsg" style="color: #ef4444; font-size: 14px; margin: 10px 0;"></p>
      <button onclick="addStudent()">Add Student</button>
    </div>

    <!-- LEADS TABLE -->
    <div class="card">
      <h3>Registered Leads</h3>

      <table id="leadTable">
        <tr>
          <th>Name</th>
          <th>Mobile</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </table>

    </div>

  </div>
  <div class="card">
    <h2>Enrolled Students List</h2>

    <table id="studentTable">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Username</th>
        <th>Batch</th>
        <th>Course</th>
        <th>Added By</th>
        <th>Action</th>
      </tr>
    </table>

  </div>

  <script>

    /* ===== LOAD LEADS ===== */
    fetch("http://localhost:5000/api/leads")
      .then(res => res.json())
      .then(leads => {

        const table = document.getElementById("leadTable");

        leads.forEach(l => {

          table.innerHTML += `
  <tr>
    <td>${l.name}</td>
    <td>${l.mobile}</td>
    <td><span class="status">${l.status || "New"}</span></td>
    <td>
      <button class="delete" onclick="deleteLead('${l._id}')">Delete</button>
    </td>
  </tr>
  `;

        });

      });

    /* ===== DELETE LEAD ===== */
    function deleteLead(id) {

      fetch("http://localhost:5000/api/leads/" + id, {
        method: "DELETE"
      })
        .then(() => location.reload());

    }

    /* ===== UPLOAD VIDEO ===== */
    function uploadVideo() {
      const title = document.getElementById("title").value;
      const url = document.getElementById("url").value;
      const course = document.getElementById("course").value;
      const batch = document.getElementById("batch").value;

      if(!title || !url || !course || !batch){
        alert("Please fill all fields");
        return;
      }

      const data = {
        title: title,
        url: url,
        course: course,
        batch: batch
      };

      fetch("http://localhost:5000/api/videos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(async res => {
        const data = await res.json();
        if(!res.ok) throw new Error(data.msg || "Failed to upload video");
        return data;
      })
      .then(() => {
        alert("Video Uploaded Successfully ✅\n\nStudents in " + batch + " can now view this video.");
        // Clear form
        document.getElementById("title").value = "";
        document.getElementById("url").value = "";
        document.getElementById("course").value = "";
      })
      .catch(err => {
        alert("Error: " + err.message);
      });
    }

    /* ===== ADD STUDENT ===== */
    function addStudent() {
      const msg = document.getElementById("addStudentMsg");
      msg.innerText = "";

      const name = document.getElementById("sname").value;
      const email = document.getElementById("semail").value;
      const phone = document.getElementById("sphone").value;
      const batch = document.getElementById("sbatch").value;
      const course = document.getElementById("scourse").value;
      const username = document.getElementById("suser").value;
      const password = document.getElementById("spass").value;

      if(!name || !batch || !course || !username || !password){
        msg.innerText = "Please fill all required fields";
        return;
      }

      const data = {
        name: name,
        email: email || "",
        phone: phone || "",
        batch: batch,
        course: course,
        username: username,
        password: password,
        createdBy: "admin"
      };

      fetch("http://localhost:5000/api/students", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(async res => {
        const data = await res.json();
        if(!res.ok) throw new Error(data.msg || "Failed to add student");
        return data;
      })
      .then(() => {
        msg.innerText = "Student Added Successfully ✅";
        msg.style.color = "#10b981";
        // Clear form
        document.getElementById("sname").value = "";
        document.getElementById("semail").value = "";
        document.getElementById("sphone").value = "";
        document.getElementById("scourse").value = "";
        document.getElementById("suser").value = "";
        document.getElementById("spass").value = "";
        // Reload student list
        setTimeout(() => {
          loadStudents();
          msg.innerText = "";
        }, 1500);
      })
      .catch(err => {
        msg.innerText = err.message || "Failed to add student";
        msg.style.color = "#ef4444";
      });
    }
    /* ===== LOAD STUDENTS ===== */
    function loadStudents(){
      fetch("http://localhost:5000/api/students")
        .then(res => res.json())
        .then(data => {
          const table = document.getElementById("studentTable");
          // Clear existing rows except header
          const headerRow = table.querySelector("tr");
          table.innerHTML = "";
          table.appendChild(headerRow);

          if(data.length === 0){
            table.innerHTML += `<tr><td colspan="7" style="text-align:center; padding:20px;">No students enrolled yet</td></tr>`;
            return;
          }

          data.forEach(s => {
            table.innerHTML += `
  <tr>
   <td>${s.name || 'N/A'}</td>
   <td>${s.email || 'N/A'}</td>
   <td><strong>${s.username || 'N/A'}</strong></td>
   <td>${s.batch || 'N/A'}</td>
   <td>${s.course || 'N/A'}</td>
   <td>${s.createdBy || 'N/A'}</td>
   <td>
     <button class="delete" onclick="deleteStudent('${s._id}')">Delete</button>
   </td>
  </tr>
  `;
          });
        })
        .catch(err => {
          console.error("Error loading students:", err);
          const table = document.getElementById("studentTable");
          table.innerHTML += `<tr><td colspan="7" style="text-align:center; color:#ef4444;">Error loading students</td></tr>`;
        });
    }

    // Load students on page load
    loadStudents();

    /* ===== DELETE STUDENT ===== */
    function deleteStudent(id){
      if(confirm("Are you sure you want to delete this student?")){
        fetch("http://localhost:5000/api/students/" + id, {
          method: "DELETE"
        })
        .then(() => location.reload());
      }
    }

    /* ===== LOGOUT ===== */
    function logout(){
      if(confirm("Are you sure you want to logout?")){
        localStorage.clear();
        window.location="login.html";
      }
    }

  </script>

</body>

</html>
